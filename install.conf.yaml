- defaults:
    link:
      create: true
      relink: true
      force: true

- link:
    ~/.zshrc: .zshrc
    ~/.vimrc: .vimrc
    ~/.vim: vim
    ~/.tmux.conf: .tmux.conf
    ~/.ssh/config: ssh/config
    ~/.ssh/homelab-admin.pub: ssh/homelab-admin.pub
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/.mcp.json: claude/.mcp.json
    ~/.claude/commands: claude/commands
    ~/.claude/agents: claude/agents
    ~/.claude/rules: claude/rules
    ~/.codex/AGENTS.md: codex/AGENTS.md
    ~/.codex/rules: codex/rules
    ~/.codex/agents: codex/agents
    ~/.agents/skills: codex/skills

- shell:
  - [git submodule update --init --recursive, Installing vim plugins]
  - ['mkdir -p .git/hooks && ln -sf ../../codex/hooks/post-merge .git/hooks/post-merge && ln -sf ../../codex/hooks/post-checkout .git/hooks/post-checkout', Installing Codex git hooks]
  - [codex/bin/codex-sync, Syncing Codex portable config]
